<!DOCTYPE html>
<html>
<head>
<title>Movie Review Sentiment Analysis</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="marquee">
<marquee scrollamount="7">
🚀 Movie Review Sentiment Analysis | Developed by Sarthak Gupta (BCA Final Year)
</marquee>
</div>

<div class="container">

<h2>Movie Review Sentiment Analysis</h2>

<form action="/predict" method="post">

<textarea name="review" rows="5" placeholder="Write your movie review here..."></textarea>

<br>

<button type="submit">Analyze Sentiment</button>

</form>

{% if result %}

<div class="result {% if result == 'positive' %}positive{% else %}negative{% endif %}">
Sentiment: {{ result }}
</div>

{% endif %}

</div>

<footer>
© 2026 Sarthak Gupta | BCA Final Year Project
</footer>

</body>
</html>
